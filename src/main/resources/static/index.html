<!DOCTYPE html>
<html>
<head>
    <title>Task Manager</title>
    <style>
        body{
            font-family: Arial;
            background:#f4f4f4;
            padding:40px;
        }

        h1{
            text-align:center;
        }

        .container{
            width:500px;
            margin:auto;
            background:white;
            padding:20px;
            border-radius:10px;
        }

        input, select, button{
            width:100%;
            padding:10px;
            margin:5px 0;
        }

        .task{
            border:1px solid #ddd;
            padding:10px;
            margin-top:10px;
            border-radius:6px;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Task Manager</h1>

    <input id="title" placeholder="Task title">

    <input id="description" placeholder="Description">

    <select id="priority">
        <option value="LOW">LOW</option>
        <option value="MEDIUM">MEDIUM</option>
        <option value="HIGH">HIGH</option>
    </select>

    <button onclick="createTask()">Add Task</button>
    <input id ="searchBox" placeholder="Search Tasks">
    <button onclick="searchTasks()">Search </button>
    <button onclick="loadTasks()">Show All</button>

    <h3>Tasks</h3>

    <div id="taskList"></div>

</div>
<script>

    async function createTask(){

    const task = {
    title: document.getElementById("title").value,
    description: document.getElementById("description").value,
    status:"TODO",
    priority: document.getElementById("priority").value
    };

    await fetch("/tasks",{
    method:"POST",
    headers:{
    "Content-Type":"application/json"
    },
    body: JSON.stringify(task)
    });

    loadTasks();
    }

    async function loadTasks(){

    const response = await fetch("/tasks");
    const tasks = await response.json();

    const list = document.getElementById("taskList");
    list.innerHTML="";

    tasks.forEach(t => {

    const div = document.createElement("div");
    div.className="task";

    div.innerHTML = `
    <b>${t.title}</b><br>
    ${t.description}<br>
    Priority: ${t.priority}<br>
    Status: ${t.status}<br>
    <button onclick="deleteTask(${t.id})">Delete</button>
    `;

    list.appendChild(div);

    });

    }

    async function searchTasks(){

    const keyword = document.getElementById("searchBox").value;

    const response = await fetch(`/tasks/search?keyword=${keyword}`);

    const tasks = await response.json();

    const list = document.getElementById("taskList");
    list.innerHTML="";

    tasks.forEach(t => {

    const div = document.createElement("div");
    div.className="task";

    div.innerHTML = `
    <b>${t.title}</b><br>
    ${t.description}<br>
    Priority: ${t.priority}<br>
    Status: ${t.status}<br>
    <button onclick="deleteTask(${t.id})">Delete</button>
    `;

    list.appendChild(div);

    });

    }

    async function deleteTask(id){

    await fetch(`/tasks/${id}`,{
    method:"DELETE"
    });

    loadTasks();

    }

    loadTasks();

</script>
</body>
</html>
